<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Market Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b12;--bg2:#0d1118;--bg3:#131a24;--bg4:#1a2232;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --tx:#d8e0ee;--tx2:#7a8699;--tx3:#3d4e66;
  --blue:#3d8ef0;--green:#00c896;--gd:rgba(0,200,150,0.1);
  --red:#f04060;--rd:rgba(240,64,96,0.1);
  --amber:#f0a020;--ad:rgba(240,160,32,0.1);
  --purple:#9b6dff;--teal:#00d4cc;
  --mono:'IBM Plex Mono',monospace;--body:'Noto Sans KR',sans-serif;
  --r:6px;--r2:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--body);min-height:100vh;overflow-x:hidden;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(61,142,240,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(61,142,240,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--tx3)}
.wrap{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:0 16px}

/* HEADER */
header{background:rgba(8,11,18,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd2);position:sticky;top:0;z-index:200}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;max-width:1600px;margin:0 auto;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500;color:#fff}
.logo-text{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.1em}
.logo-ver{font-size:9px;color:var(--tx3);font-family:var(--mono)}
.hdr-idx{display:flex;gap:18px;flex-wrap:wrap}
.idx-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.idx-sym{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.08em}
.idx-val{font-family:var(--mono);font-size:13px;font-weight:500}
.hdr-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.refresh-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);padding:5px 12px;color:var(--tx2);font-family:var(--mono);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue)}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV */
.nav-wrap{background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:53px;z-index:199}
.nav-inner{max-width:1600px;margin:0 auto;padding:0 16px;display:flex;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{padding:11px 16px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:var(--tx2)}
.nav-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.nav-dot{width:6px;height:6px;border-radius:50%}

/* PAGES */
main{padding:16px 0 60px}
.page{display:none;animation:fadeUp .2s ease}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.card-hdr{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);display:flex;align-items:center;gap:6px}
.card-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--tx3)}
.card-body{padding:12px 14px}

/* GRIDS */
.g-main{display:grid;grid-template-columns:1fr 340px;gap:12px}
.g-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g-2{display:grid;grid-template-columns:2fr 1fr;gap:12px}
@media(max-width:1100px){.g-main{grid-template-columns:1fr}.g-2{grid-template-columns:1fr}}
@media(max-width:800px){.g-3{grid-template-columns:1fr 1fr}}
@media(max-width:540px){.g-3{grid-template-columns:1fr}}
.mb12{margin-bottom:12px}

/* INDEX STRIP */
.idx-strip{display:grid;grid-template-columns:repeat(4,1fr)}
.idx-cell{padding:14px 16px;border-right:1px solid var(--bd)}
.idx-cell:last-child{border-right:none}
.ic-sym{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.1em;margin-bottom:4px}
.ic-val{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1;margin-bottom:3px}
.ic-chg{font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:3px;margin-bottom:8px}
.ic-bar{height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;position:relative}
.ic-fill{position:absolute;top:0;height:100%;border-radius:1px}
@media(max-width:600px){.idx-strip{grid-template-columns:repeat(2,1fr)}.idx-cell:nth-child(2){border-right:none}.idx-cell:nth-child(3),.idx-cell:nth-child(4){border-top:1px solid var(--bd)}.idx-cell:nth-child(4){border-right:none}}

/* MARKET STORY */
.story-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.story-top{padding:14px 18px;border-bottom:1px solid var(--bd)}
.story-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.story-eyebrow::before{content:'';display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--blue)}
.story-headline{font-size:14px;font-weight:500;color:var(--tx);line-height:1.55;margin-bottom:12px}
.story-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.bias-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 12px;border-radius:4px;border:1px solid transparent}
.bias-off{background:var(--rd);color:var(--red);border-color:rgba(240,64,96,.25)}
.bias-on{background:var(--gd);color:var(--green);border-color:rgba(0,200,150,.25)}
.bias-neu{background:var(--ad);color:var(--amber);border-color:rgba(240,160,32,.25)}
.conf{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.story-drivers{padding:10px 18px;display:flex;gap:7px;flex-wrap:wrap}
.drv{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:4px;background:var(--bg3);border:1px solid var(--bd);color:var(--tx2)}
.drv.neg{border-color:rgba(240,64,96,.2);color:var(--red)}
.drv.pos{border-color:rgba(0,200,150,.2);color:var(--green)}
.drv.warn{border-color:rgba(240,160,32,.2);color:var(--amber)}

/* NEWS */
.news-item{padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:var(--bg3)}
.news-item.expanded .news-summary{display:block}
.news-item.expanded .news-arrow{transform:rotate(90deg)}
.news-row1{display:flex;gap:9px;align-items:flex-start;margin-bottom:5px}
.news-num{font-family:var(--mono);font-size:9px;color:var(--tx3);min-width:12px;margin-top:2px;flex-shrink:0}
.news-hl{font-size:12px;font-weight:500;color:var(--tx);line-height:1.45;flex:1}
.news-arrow{font-size:11px;color:var(--tx3);flex-shrink:0;margin-top:2px;transition:transform .2s}
.news-meta{display:flex;gap:5px;align-items:center;padding-left:21px;flex-wrap:wrap;margin-top:2px}
.imp{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;font-weight:500;flex-shrink:0;border:1px solid transparent}
.imp-high{background:var(--rd);color:var(--red);border-color:rgba(240,64,96,.2)}
.imp-mid{background:var(--ad);color:var(--amber);border-color:rgba(240,160,32,.2)}
.imp-low{background:var(--gd);color:var(--green);border-color:rgba(0,200,150,.2)}
.news-cat{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg4);color:var(--tx3)}
.news-src{font-family:var(--mono);font-size:9px;color:var(--tx3)}
.news-impact{font-family:var(--mono);font-size:9px;color:var(--teal);width:100%;margin-top:2px}
.news-summary{font-size:11px;color:var(--tx2);line-height:1.7;margin-top:7px;padding-left:21px;display:none}

/* ACTIONABLE INSIGHT */
.ins-row{padding:9px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px}
.ins-row:last-child{border-bottom:none}
.ins-label{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);min-width:96px;flex-shrink:0;margin-top:2px}
.ins-val{font-size:11px;color:var(--tx);flex:1;line-height:1.5}
.ins-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;display:inline-block;margin-right:4px}
.b-bull{background:var(--gd);color:var(--green)}
.b-bear{background:var(--rd);color:var(--red)}
.b-neu{background:var(--ad);color:var(--amber)}
.b-blue{background:rgba(61,142,240,.12);color:var(--blue)}
.wt{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;background:var(--bg4);border:1px solid var(--bd2);color:var(--tx2);display:inline-block;margin:2px 2px 0 0}

/* SECTOR */
.sec-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd)}
.sec-row:first-child{padding-top:0}
.sec-row:last-child{border-bottom:none;padding-bottom:0}
.sec-name{font-size:11px;color:var(--tx2);min-width:68px}
.sec-bar{flex:1;height:3px;background:var(--bg4);border-radius:1.5px;position:relative}
.sec-fill{position:absolute;top:0;height:100%;border-radius:1.5px}
.sec-pct{font-family:var(--mono);font-size:11px;min-width:44px;text-align:right}

/* ECON */
.econ-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)}
.econ-row:first-child{padding-top:0}
.econ-row:last-child{border-bottom:none;padding-bottom:0}
.econ-name{font-size:11px;color:var(--tx2)}
.econ-right{display:flex;align-items:center;gap:8px}
.econ-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--tx)}
.econ-chg{font-family:var(--mono);font-size:10px}

/* BUZZ */
.buzz-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--bd)}
.buzz-row:first-child{padding-top:0}
.buzz-row:last-child{border-bottom:none;padding-bottom:0}
.buzz-rank{font-family:var(--mono);font-size:9px;color:var(--tx3);width:12px;text-align:center;flex-shrink:0}
.buzz-ticker{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--blue);min-width:42px;flex-shrink:0}
.buzz-info{flex:1;min-width:0}
.buzz-name{font-size:10px;color:var(--tx2)}
.buzz-reason{font-size:9px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.buzz-heat{display:flex;gap:2px;flex-shrink:0}
.hb{width:3px;height:11px;border-radius:1.5px;background:var(--bg4)}
.hb.on{background:var(--blue)}
.buzz-chg{font-family:var(--mono);font-size:11px;min-width:42px;text-align:right;flex-shrink:0}

/* SCHEDULE */
.sched-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--bd);align-items:flex-start}
.sched-row:first-child{padding-top:0}
.sched-row:last-child{border-bottom:none;padding-bottom:0}
.sched-time{min-width:54px;flex-shrink:0}
.sched-date{font-family:var(--mono);font-size:9px;color:var(--tx3)}
.sched-kst{font-family:var(--mono);font-size:11px;color:var(--tx2);font-weight:500}
.sched-body{flex:1;min-width:0}
.sched-title-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.sched-title{font-size:11px;font-weight:500;color:var(--tx)}
.sched-desc{font-size:10px;color:var(--tx3);line-height:1.5;margin-top:2px}
.sched-type{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;display:inline-block}
.t-econ{background:rgba(61,142,240,.12);color:var(--blue)}
.t-fed{background:rgba(155,109,255,.12);color:var(--purple)}
.t-earn{background:rgba(0,212,204,.12);color:var(--teal)}

/* MOOD */
.mood-gauge-wrap{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.mood-label{font-size:18px;font-weight:500}
.mood-sub{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:2px}
.mood-sig{font-size:11px;color:var(--tx2);background:var(--bg3);border-radius:var(--r);padding:7px 10px;margin-bottom:8px;line-height:1.5}
.mood-sum{font-size:11px;color:var(--tx2);line-height:1.7}

/* SCENARIO */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:600px){.sc-grid{grid-template-columns:1fr}}
.sc-card{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.sc-hdr{padding:8px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.sc-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.sc-icon.bull{background:var(--gd);color:var(--green)}
.sc-icon.bear{background:var(--rd);color:var(--red)}
.sc-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2)}
.sc-body{padding:10px 12px}
.sc-desc{font-size:11px;color:var(--tx2);line-height:1.6;margin-bottom:8px}
.sc-cond-lbl{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.06em;margin-bottom:4px}
.sc-cond{font-family:var(--mono);font-size:10px;padding:5px 8px;border-radius:3px;background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);line-height:1.5}
.trg-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 14px;margin-bottom:12px}
.trg-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.trg-item{display:flex;gap:8px;font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:5px}
.trg-item:last-child{margin-bottom:0}
.trg-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:5px}
.wn-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 14px}
.wn-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.wn-items{display:flex;flex-wrap:wrap;gap:6px}
.wn-item{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2)}

/* SECTOR PAGE */
.sector-banner{border:1px solid var(--bd);border-radius:var(--r2);padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.sec-name-big{font-family:var(--mono);font-size:26px;font-weight:500;letter-spacing:.04em}
.sec-desc-txt{font-size:12px;color:var(--tx2);margin-top:4px;max-width:480px}
.sec-stats{display:flex;gap:20px;flex-wrap:wrap}
.ss-label{font-family:var(--mono);font-size:9px;color:var(--tx3)}
.ss-val{font-family:var(--mono);font-size:18px;font-weight:500;margin-top:2px}
.stk-table{width:100%;border-collapse:collapse}
.stk-table th{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);text-align:left;padding:0 0 9px;border-bottom:1px solid var(--bd)}
.stk-table th:not(:first-child){text-align:right}
.stk-table td{padding:9px 0;border-bottom:1px solid var(--bd);font-size:11px}
.stk-table tr:last-child td{border-bottom:none}
.stk-table td:not(:first-child){text-align:right;font-family:var(--mono)}
.stk-ticker{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:500}
.stk-co{font-size:9px;color:var(--tx3);margin-top:1px}
.sig{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px}
.sig-buy{background:var(--gd);color:var(--green)}
.sig-hold{background:var(--bg4);color:var(--tx3)}
.sig-sell{background:var(--rd);color:var(--red)}
.watch-item{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.watch-item:last-child{margin-bottom:0}
.watch-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.watch-title{font-size:12px;font-weight:500;color:var(--tx);line-height:1.4}
.watch-body{font-size:11px;color:var(--tx2);line-height:1.6}
.wtag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;flex-shrink:0}
.wtag-bull{background:var(--gd);color:var(--green)}
.wtag-bear{background:var(--rd);color:var(--red)}
.wtag-watch{background:var(--ad);color:var(--amber)}

/* LOADING / ERROR */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px}
.loading-bar{width:140px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.loading-fill{height:100%;background:var(--blue);animation:load 1.3s ease-in-out infinite;border-radius:1px}
@keyframes load{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.loading-txt{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.err-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:8px;text-align:center}
.err-title{font-size:13px;color:var(--tx);font-weight:500}
.err-desc{font-size:11px;color:var(--tx3);max-width:320px;line-height:1.6}

/* NEWS CORRELATION */
.corr-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.corr-hdr{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.corr-body{padding:14px}
.corr-story{font-size:12px;color:var(--tx2);line-height:1.8;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.corr-chains{display:flex;flex-direction:column;gap:10px}
.corr-chain{display:flex;gap:0;align-items:center;flex-wrap:wrap}
.corr-node{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);white-space:nowrap}
.corr-node.cause{background:rgba(240,64,96,0.1);border-color:rgba(240,64,96,0.25);color:var(--red)}
.corr-node.effect{background:rgba(61,142,240,0.1);border-color:rgba(61,142,240,0.25);color:var(--blue)}
.corr-node.mixed{background:rgba(240,160,32,0.1);border-color:rgba(240,160,32,0.25);color:var(--amber)}
.corr-arrow{font-size:14px;color:var(--tx3);margin:0 6px;flex-shrink:0}
.corr-impact{font-size:10px;color:var(--tx3);margin-top:3px;padding-left:2px;font-style:italic}

/* SECTOR PAGE V2 */
.sec-top-grid{display:grid;grid-template-columns:1fr 320px;gap:12px;margin-bottom:12px}
@media(max-width:900px){.sec-top-grid{grid-template-columns:1fr}}
.rec-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.rec-hdr{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.rec-item{padding:12px 14px;border-bottom:1px solid var(--bd)}
.rec-item:last-child{border-bottom:none}
.rec-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.rec-rank{font-family:var(--mono);font-size:10px;color:var(--tx3);width:16px;text-align:center;flex-shrink:0}
.rec-ticker{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--blue)}
.rec-name{font-size:11px;color:var(--tx2);flex:1}
.rec-price{font-family:var(--mono);font-size:12px;color:var(--tx)}
.rec-chg{font-family:var(--mono);font-size:11px;min-width:52px;text-align:right}
.rec-signal{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;flex-shrink:0}
.rec-reason{font-size:11px;color:var(--tx2);line-height:1.55;margin-top:4px;padding-left:26px}
.sec-sched-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.sec-sched-item{padding:10px 14px;border-bottom:1px solid var(--bd)}
.sec-sched-item:last-child{border-bottom:none}
.sec-sched-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:5px}
.sec-sched-date{font-family:var(--mono);font-size:10px;color:var(--blue);min-width:60px;flex-shrink:0;margin-top:1px}
.sec-sched-title{font-size:12px;font-weight:500;color:var(--tx);flex:1}
.sec-sched-insight{font-size:11px;color:var(--tx2);line-height:1.6;margin-top:4px;padding:6px 8px;background:var(--bg3);border-left:2px solid var(--blue);border-radius:0 4px 4px 0}
.stk-issue{font-size:10px;color:var(--tx3);margin-top:2px;line-height:1.4}
.news-link{font-family:var(--mono);font-size:9px;color:var(--blue);text-decoration:none;margin-left:4px;opacity:.7}
.news-link:hover{opacity:1;text-decoration:underline}
</style>
</head>

<script>
const SECTORS={
  tech:      {name:'Tech',     color:'#3d8ef0',desc:'반도체·AI·소프트웨어·클라우드',  tickers:['NVDA','AAPL','MSFT','META','GOOGL','AMZN','AMD','TSLA','ORCL','ADBE'],etf:'QQQ'},
  energy:    {name:'Energy',   color:'#f0a020',desc:'원유·천연가스·재생에너지·정유',   tickers:['XOM','CVX','COP','SLB','MPC','PSX','VLO','OXY','HAL','DVN'],etf:'XLE'},
  finance:   {name:'Finance',  color:'#00c896',desc:'은행·보험·핀테크·자산운용',       tickers:['JPM','BAC','GS','MS','WFC','BLK','C','AXP','V','MA'],etf:'XLF'},
  consumer:  {name:'Consumer', color:'#f06080',desc:'임의소비재·필수소비재·유통·식품', tickers:['AMZN','TSLA','HD','MCD','NKE','SBUX','TGT','COST','WMT','PG'],etf:'XLY'},
  realestate:{name:'Real Estate',color:'#00c8b4',desc:'리츠·상업용 부동산·모기지·인프라',tickers:['PLD','AMT','EQIX','SPG','O','DLR','PSA','EQR','AVB','VNQ'],etf:'XLRE'},
  crypto:    {name:'Crypto',   color:'#9b6dff',desc:'비트코인·이더리움·블록체인 기업', tickers:['COIN','MSTR','MARA','RIOT','CLSK','HUT','IBIT','BITB','FBTC','GBTC'],etf:'IBIT'},
};
let DATA=null,SECTOR_DATA={},currentTab='overview';

function tick(){
  const k=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const e=new Date().toLocaleString('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit'});
  const el=document.getElementById('clock');if(el)el.textContent=`KST ${k}  ·  ET ${e}`;
}
setInterval(tick,1000);tick();

function goTab(t){
  currentTab=t;
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+t).classList.add('on');
  if(t!=='overview'&&!SECTOR_DATA[t])loadSector(t);
}

const cls=n=>n>0?'up':n<0?'down':'flat';
const arr=n=>n>0?'▲':n<0?'▼':'—';
const fmt=n=>n?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})??'-';
const impCls=s=>{const l=(s||'').toLowerCase();return l==='high'||l==='높음'||l==='critical'?'imp-high':l==='mid'||l==='medium'||l==='보통'?'imp-mid':'imp-low';};
const impLbl=s=>{const l=(s||'').toLowerCase();return l==='critical'?'CRITICAL':l==='high'||l==='높음'?'HIGH':l==='mid'||l==='medium'||l==='보통'?'MEDIUM':'LOW';};

function renderOverview(d){
  const I=d.indices||{};
  const ai=d.aiInsight||{};

  /* Header */
  const hItems=[{sym:'S&P 500',v:I.sp500?.value,c:I.sp500?.change_pct},{sym:'NASDAQ',v:I.nasdaq?.value,c:I.nasdaq?.change_pct},{sym:'DOW',v:I.dow?.value,c:I.dow?.change_pct},{sym:'VIX',v:I.vix?.value,c:I.vix?.change}];
  const hi=document.getElementById('hdrIdx');
  if(hi)hi.innerHTML=hItems.map(x=>`<div class="idx-item"><div class="idx-sym">${x.sym}</div><div class="idx-val ${cls(x.c)}">${fmt(x.v)}</div></div>`).join('');

  /* Index Strip */
  const strip=document.getElementById('idxStrip');
  if(strip)strip.innerHTML=`<div class="idx-strip">${hItems.map(x=>{const p=x.c??0;const bw=Math.min(Math.abs(p)*15,100);return`<div class="idx-cell"><div class="ic-sym">${x.sym}</div><div class="ic-val ${cls(p)}">${fmt(x.v)}</div><div class="ic-chg ${cls(p)}">${arr(p)} ${p>=0?'+':''}${p?.toFixed(2)}${x.sym==='VIX'?'':' %'}</div><div class="ic-bar"><div class="ic-fill" style="width:${bw}%;background:${p>=0?'var(--green)':'var(--red)'}"></div></div></div>`;}).join('')}</div>`;

  /* Market Story */
  const story=ai.marketStory||d.market_mood?.summary||'';
  const bias=ai.marketBias||'neutral';
  const bCls=bias==='risk-off'?'bias-off':bias==='risk-on'?'bias-on':'bias-neu';
  const bLbl=bias==='risk-off'?'⬇ RISK-OFF':bias==='risk-on'?'⬆ RISK-ON':'→ NEUTRAL';
  const drivers=ai.drivers||[];
  const conf=ai.confidenceScore;
  const sw=document.getElementById('storyWrap');
  if(sw)sw.innerHTML=`<div class="story-top"><div class="story-eyebrow">Today's Market Story</div><div class="story-headline">${story}</div><div class="story-meta"><span class="bias-chip ${bCls}">${bLbl}</span>${conf!=null?`<span class="conf">신뢰도 ${conf}%</span>`:''}</div></div><div class="story-drivers">${drivers.map(dv=>`<span class="drv ${dv.direction==='neg'?'neg':dv.direction==='pos'?'pos':'warn'}">${dv.icon||''} ${dv.label}</span>`).join('')}</div>`;

  /* News */
  const kst=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const ntEl=document.getElementById('newsTime');if(ntEl)ntEl.textContent=kst;
  const nb=document.getElementById('newsBody');
  if(nb)nb.innerHTML=(d.top_news||[]).map((n,i)=>`<div class="news-item" onclick="this.classList.toggle('expanded')"><div class="news-row1"><span class="news-num">${i+1}</span><span class="news-hl">${n.headline||''}${n.url?`<a class="news-link" href="${n.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗</a>`:''}</span><span class="news-arrow">›</span></div><div class="news-meta"><span class="imp ${impCls(n.importance)}">${impLbl(n.importance)}</span>${n.category?`<span class="news-cat">${n.category}</span>`:''}<span class="news-src">${n.source||''}</span>${n.time?`<span class="news-src">${n.time}</span>`:''} ${n.impact?`<div class="news-impact">→ ${n.impact}</div>`:''}</div><div class="news-summary">${n.summary||''}</div></div>`).join('');

  /* Mood */
  const mood=d.market_mood||{};const score=mood.score??50;const mc=score>=60?'var(--green)':score>=40?'var(--amber)':'var(--red)';const r=24,circ=2*Math.PI*r;
  const mb=document.getElementById('moodBody');
  if(mb)mb.innerHTML=`<div class="mood-gauge-wrap"><svg width="56" height="56" viewBox="0 0 56 56" role="img" aria-label="공포탐욕 지수 ${score}"><circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--bg4)" stroke-width="5"/><circle cx="28" cy="28" r="${r}" fill="none" stroke="${mc}" stroke-width="5" stroke-dasharray="${circ*score/100} ${circ}" stroke-linecap="round" transform="rotate(-90 28 28)"/><text x="28" y="33" text-anchor="middle" font-size="12" font-weight="500" fill="${mc}">${score}</text></svg><div><div class="mood-label" style="color:${mc}">${mood.label||''}</div><div class="mood-sub">공포·탐욕 지수</div></div></div><div class="mood-sig">${mood.vix_signal||''}</div><div class="mood-sum">${mood.summary||''}</div>`;

  /* Sectors */
  const sb=document.getElementById('sectorBody');
  if(sb)sb.innerHTML=(d.sectors||[]).map(s=>{const p=s.change_pct??0;const bw=Math.min(Math.abs(p)*18,48);const bl=p>=0?'50%':`calc(50% - ${bw}%)`;return`<div class="sec-row"><div class="sec-name">${s.name}</div><div class="sec-bar"><div class="sec-fill" style="width:${bw}%;left:${bl};background:${p>=0?'var(--green)':'var(--red)'}"></div></div><div class="sec-pct ${cls(p)}">${p>=0?'+':''}${p.toFixed(2)}%</div></div>`;}).join('');

  /* Econ */
  const eb=document.getElementById('econBody');
  if(eb)eb.innerHTML=(d.economic_indicators||[]).map(e=>`<div class="econ-row"><div class="econ-name">${e.name}</div><div class="econ-right"><div class="econ-val">${e.value}${e.unit?' '+e.unit:''}</div><div class="econ-chg ${cls(e.change||0)}">${arr(e.change||0)} ${Math.abs(e.change||0).toFixed(2)}</div></div></div>`).join('');

  /* Buzz */
  const bb=document.getElementById('buzzBody');
  if(bb)bb.innerHTML=(d.buzz_stocks||[]).map(b=>`<div class="buzz-row"><div class="buzz-rank">${b.rank||''}</div><div class="buzz-ticker">${b.ticker||''}</div><div class="buzz-info"><div class="buzz-name">${b.name||''}</div><div class="buzz-reason">${b.reason||''}</div></div><div class="buzz-heat">${[1,2,3,4,5].map(i=>`<div class="hb ${i<=(b.heat||0)?'on':''}"></div>`).join('')}</div><div class="buzz-chg ${cls(b.change_pct??0)}">${arr(b.change_pct??0)} ${Math.abs(b.change_pct??0).toFixed(1)}%</div></div>`).join('');

  /* Schedule */
  const schb=document.getElementById('schedBody');
  if(schb)schb.innerHTML=(d.schedule||[]).map(s=>`<div class="sched-row"><div class="sched-time"><div class="sched-date">${s.date_kst||s.date||''}</div><div class="sched-kst">${s.time_kst||s.time||''}</div></div><div class="sched-body"><div class="sched-title-row"><span class="imp ${impCls(s.importance)}">${impLbl(s.importance)}</span><span class="sched-title">${s.title||''}</span></div><div class="sched-desc">${s.description||s.desc||''}</div><span class="sched-type t-${(s.type||'econ').replace('earnings','earn')}">${{econ:'경제지표',fed:'연준',earn:'실적',earnings:'실적'}[s.type?.toLowerCase()]??s.type??''}</span></div></div>`).join('');

  /* Actionable Insight */
  const ins=ai.actionableInsights||d.market_outlook||{};
  const ib=document.getElementById('insightBody');
  if(ib){
    const eq=ins.equityBias||ins.overall_sentiment||'neutral';
    const eqB=eq==='bullish'?'b-bull':eq==='bearish'?'b-bear':'b-neu';
    const eqL=eq==='bullish'?'↑ BULLISH':eq==='bearish'?'↓ BEARISH':'→ NEUTRAL';
    const rl=(ins.riskLevel||ins.risk_level||'medium').toUpperCase();
    const rlB=rl==='HIGH'?'b-bear':rl==='LOW'?'b-bull':'b-neu';
    const rot=ins.sectorRotation||ins.sector_rotation||'-';
    const wl=Array.isArray(ins.watchList)?ins.watchList:Array.isArray(ins.watch_list)?ins.watch_list:[];
    const acts=Array.isArray(ins.strategy)?ins.strategy:[];
    ib.innerHTML=`
      <div class="ins-row"><div class="ins-label">Equity Bias</div><div class="ins-val"><span class="ins-badge ${eqB}">${eqL}</span></div></div>
      <div class="ins-row"><div class="ins-label">Sector Rotation</div><div class="ins-val" style="color:var(--tx2)">${rot}</div></div>
      <div class="ins-row"><div class="ins-label">Risk Level</div><div class="ins-val"><span class="ins-badge ${rlB}">${rl}</span></div></div>
      ${wl.length?`<div class="ins-row"><div class="ins-label">Watch List</div><div class="ins-val">${wl.map(w=>`<span class="wt">${w}</span>`).join('')}</div></div>`:''}
      ${acts.length?`<div class="ins-row"><div class="ins-label">Today's Action</div><div class="ins-val">${acts.map(a=>`<div style="margin-bottom:4px;font-size:11px;color:var(--tx2)">· ${a}</div>`).join('')}</div></div>`:''}`;
  }

  /* News Correlation */
  const corr=ai.newsCorrelation||ai.correlations||null;
  const corrWrap=document.getElementById('corrWrap');
  const corrBody=document.getElementById('corrBody');
  if(corr&&corrBody){
    corrWrap.style.display='block';
    const chains=(corr.chains||[]);
    corrBody.innerHTML=`
      <div class="corr-story">${corr.summary||''}</div>
      <div class="corr-chains">
        ${chains.map(chain=>`
          <div>
            <div class="corr-chain">
              ${chain.nodes.map((node,i)=>`
                ${i>0?'<span class="corr-arrow">→</span>':''}
                <span class="corr-node ${node.type||''}">${node.label}</span>
              `).join('')}
            </div>
            ${chain.impact?`<div class="corr-impact">💡 ${chain.impact}</div>`:''}
          </div>
        `).join('')}
      </div>`;
  }

  /* Scenario */
  const sc=ai.scenarios||{};
  const confEl=document.getElementById('scenarioConf');if(confEl&&conf!=null)confEl.textContent=`신뢰도: ${conf}%`;
  const scEl=document.getElementById('scenarioBody');
  if(scEl){
    const bull=sc.bullish||{};const bear=sc.bearish||{};
    const trigs=Array.isArray(sc.keyTriggers)?sc.keyTriggers:Array.isArray(d.market_outlook?.key_risks)?d.market_outlook.key_risks:[];
    const wn=Array.isArray(sc.watchNext)?sc.watchNext:[];
    scEl.innerHTML=`
      <div class="sc-grid">
        <div class="sc-card"><div class="sc-hdr"><div class="sc-icon bull">↑</div><div class="sc-lbl">Bullish Scenario</div></div><div class="sc-body"><div class="sc-desc">${bull.desc||bull||''}</div>${bull.condition?`<div class="sc-cond-lbl">CONDITION</div><div class="sc-cond">${bull.condition}</div>`:''}</div></div>
        <div class="sc-card"><div class="sc-hdr"><div class="sc-icon bear">↓</div><div class="sc-lbl">Bearish Scenario</div></div><div class="sc-body"><div class="sc-desc">${bear.desc||bear||''}</div>${bear.condition?`<div class="sc-cond-lbl">CONDITION</div><div class="sc-cond">${bear.condition}</div>`:''}</div></div>
      </div>

function loadData(){
  const btn=document.getElementById('refreshBtn');const ico=document.getElementById('refreshIco');
  if(btn){btn.disabled=true;ico.className='spin'}
  if(window.MARKET_DATA||window.__PRELOADED_DATA__){
    DATA=window.MARKET_DATA||window.__PRELOADED_DATA__;renderOverview(DATA);
    if(currentTab!=='overview')loadSector(currentTab);
    if(btn){btn.disabled=false;ico.className=''}return;
  }
  const today=new Date().toLocaleDateString('sv-SE');
  const paths=[`reports/market_data_${today}.json`,`market_data_${today}.json`];
  (async()=>{
    for(const p of paths){try{const r=await fetch(p);if(r.ok){DATA=await r.json();renderOverview(DATA);break;}}catch(_){}}
    if(!DATA){['newsBody','sectorBody','econBody','buzzBody','schedBody','moodBody','insightBody','scenarioBody','storyWrap'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=`<div class="err-wrap"><div class="err-title">데이터 없음</div><div class="err-desc">run_market_update.bat 실행 후 새로고침하세요</div></div>`;});}
    if(btn){btn.disabled=false;ico.className=''}
  })();
}

async function loadSector(key){
  const pg=document.getElementById('page-'+key);
  pg.innerHTML=`<div class="loading-wrap" style="padding:80px"><div class="loading-bar"><div class="loading-fill"></div></div><div class="loading-txt">${SECTORS[key].name} 데이터 로딩 중...</div></div>`;
  if(SECTOR_DATA[key]){renderSector(key,SECTOR_DATA[key]);return;}
  if(window.SECTOR_PRELOAD&&window.SECTOR_PRELOAD[key]){SECTOR_DATA[key]=window.SECTOR_PRELOAD[key];renderSector(key,SECTOR_DATA[key]);return;}
  const today=new Date().toLocaleDateString('sv-SE');
  for(const p of[`reports/sector_${key}_${today}.json`,`reports/sector_${key}.json`]){
    try{const r=await fetch(p);if(r.ok){SECTOR_DATA[key]=await r.json();renderSector(key,SECTOR_DATA[key]);return;}}catch(_){}
  }
  if(DATA){
    const enMap={consumer:'consumer discretionary',realestate:'real estate'};
    const searchKey=enMap[key]||key;
    const sec=DATA.sectors?.find(s=>(s.en||'').toLowerCase().includes(searchKey));
    renderSector(key,{sector_perf:{pct:sec?(sec.change_pct>=0?'+':'')+sec.change_pct.toFixed(2):'0',etf_val:'-'},top_news:DATA.top_news?.slice(0,3)??[],stocks:[],weekly_watch:[]});
  }
  else pg.innerHTML=`<div class="err-wrap" style="padding:80px"><div class="err-title">섹터 데이터 없음</div></div>`;
}

window.addEventListener('DOMContentLoaded',loadData);
</script>
