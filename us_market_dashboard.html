<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1218;
  --bg3: #161b24;
  --bg4: #1c2330;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8b92a5;
  --text3: #4d5568;
  --accent: #4f9eff;
  --accent2: #2563eb;
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.12);
  --red: #f43f5e;
  --red-dim: rgba(244,63,94,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --purple: #8b5cf6;
  --teal: #14b8a6;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Noto Sans KR', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRID NOISE BACKGROUND */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(79,158,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,158,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  background: rgba(10,12,16,0.9);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  max-width: 1400px;
  margin: 0 auto;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 32px; height: 32px;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.logo-text {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text);
}
.logo-sub { font-size: 10px; color: var(--text3); font-family: var(--font-mono); }
.header-right { display: flex; align-items: center; gap: 16px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 11px; color: var(--green);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.header-time { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
.refresh-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 12px;
  color: var(--text2);
  font-size: 12px;
  font-family: var(--font-body);
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.refresh-btn.loading { opacity: 0.5; pointer-events: none; }
.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── NAV TABS ── */
.nav-wrap {
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 61px;
  z-index: 99;
}
.nav-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 0 24px;
  display: flex; gap: 0; overflow-x: auto;
  scrollbar-width: none;
}
.nav-inner::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 7px;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font-body);
  letter-spacing: 0.01em;
}
.nav-tab:hover { color: var(--text2); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-icon { font-size: 14px; opacity: 0.8; }
.sector-dot {
  width: 7px; height: 7px; border-radius: 50%;
}

/* ── MAIN ── */
main { padding: 28px 0 60px; }

/* PAGE */
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── OVERVIEW PAGE ── */
/* Market Ticker Strip */
.ticker-strip {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  display: flex; gap: 32px; align-items: center;
  margin-bottom: 24px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: wrap;
}
.ticker-item { display: flex; flex-direction: column; gap: 2px; min-width: 80px; }
.ticker-name { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; }
.ticker-val { font-family: var(--font-mono); font-size: 15px; font-weight: 500; color: var(--text); }
.ticker-chg { font-family: var(--font-mono); font-size: 11px; }
.ticker-chg.up { color: var(--green); }
.ticker-chg.down { color: var(--red); }
.ticker-chg.flat { color: var(--text3); }
.ticker-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

/* Grid Layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-wide { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }

/* Card */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.card-header {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text2);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.card-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg4);
  color: var(--text3);
}
.card-body { padding: 16px 18px; }

/* News Item */
.news-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.news-item:last-child { border-bottom: none; padding-bottom: 0; }
.news-item:first-child { padding-top: 0; }
.news-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  min-width: 16px;
  margin-top: 3px;
}
.news-body { flex: 1; min-width: 0; }
.news-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 5px;
  cursor: pointer;
}
.news-title:hover { color: var(--accent); }
.news-meta {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.news-source { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.news-time { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.news-summary {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  margin-top: 5px;
  display: none;
}
.news-item.expanded .news-summary { display: block; }

/* Importance Badge */
.imp {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.imp-high { background: var(--red-dim); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }
.imp-mid  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
.imp-low  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }

/* Index Cards */
.index-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.index-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  transition: border-color 0.2s;
}
.index-card:hover { border-color: var(--border2); }
.index-card-name { font-family: var(--font-mono); font-size: 10px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.06em; }
.index-card-val { font-family: var(--font-mono); font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.index-card-chg { font-family: var(--font-mono); font-size: 12px; }
.index-bar {
  height: 2px;
  border-radius: 1px;
  margin-top: 10px;
  background: var(--bg4);
  position: relative;
  overflow: hidden;
}
.index-bar-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  border-radius: 1px;
  transition: width 1s ease;
}

/* Sector Row */
.sector-row {
  display: flex; align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.sector-row:last-child { border-bottom: none; padding-bottom: 0; }
.sector-row:first-child { padding-top: 0; }
.sector-row-name { font-size: 12px; color: var(--text2); flex: 1; }
.sector-bar-wrap { flex: 2; height: 4px; background: var(--bg4); border-radius: 2px; position: relative; overflow: hidden; }
.sector-bar-fill { position: absolute; left: 50%; top: 0; height: 100%; border-radius: 2px; transition: width 0.8s ease; }
.sector-pct { font-family: var(--font-mono); font-size: 11px; min-width: 48px; text-align: right; }

/* Buzz Stock */
.buzz-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.buzz-item:last-child { border-bottom: none; padding-bottom: 0; }
.buzz-item:first-child { padding-top: 0; }
.buzz-rank { font-family: var(--font-mono); font-size: 11px; color: var(--text3); width: 16px; text-align: center; }
.buzz-ticker {
  font-family: var(--font-mono); font-size: 13px; font-weight: 500;
  color: var(--accent); min-width: 52px;
}
.buzz-name { font-size: 12px; color: var(--text2); flex: 1; }
.buzz-heat {
  display: flex; gap: 2px; align-items: center;
}
.heat-bar {
  width: 4px; height: 14px; border-radius: 2px; background: var(--bg4);
}
.heat-bar.filled { background: var(--accent); opacity: 0.7; }
.heat-bar.filled:last-child { opacity: 1; }
.buzz-chg { font-family: var(--font-mono); font-size: 12px; min-width: 52px; text-align: right; }

/* Calendar / Schedule */
.sched-item {
  display: flex; gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.sched-item:last-child { border-bottom: none; padding-bottom: 0; }
.sched-item:first-child { padding-top: 0; }
.sched-time-col { min-width: 64px; }
.sched-date { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.sched-time { font-family: var(--font-mono); font-size: 12px; color: var(--text2); font-weight: 500; }
.sched-body { flex: 1; }
.sched-title { font-size: 13px; color: var(--text); font-weight: 500; margin-bottom: 3px; }
.sched-desc { font-size: 11px; color: var(--text3); line-height: 1.5; }
.sched-type {
  font-family: var(--font-mono); font-size: 10px;
  padding: 2px 6px; border-radius: 3px;
  display: inline-block; margin-top: 4px;
}
.sched-fed { background: rgba(139,92,246,0.15); color: var(--purple); }
.sched-econ { background: rgba(79,158,255,0.12); color: var(--accent); }
.sched-earn { background: rgba(20,184,166,0.12); color: var(--teal); }

/* ── SECTOR PAGES ── */
.sector-hero {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.sector-hero-left { display: flex; flex-direction: column; gap: 6px; }
.sector-hero-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; }
.sector-hero-name {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.02em;
}
.sector-hero-desc { font-size: 13px; color: var(--text2); max-width: 500px; line-height: 1.5; }
.sector-hero-stats { display: flex; gap: 24px; }
.hero-stat { display: flex; flex-direction: column; gap: 3px; }
.hero-stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.hero-stat-val { font-family: var(--font-mono); font-size: 18px; font-weight: 500; }

/* Stock Table */
.stock-table { width: 100%; border-collapse: collapse; }
.stock-table th {
  font-family: var(--font-mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.06em; text-align: left;
  padding: 0 0 10px; border-bottom: 1px solid var(--border);
}
.stock-table th:not(:first-child) { text-align: right; }
.stock-table td {
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.stock-table tr:last-child td { border-bottom: none; }
.stock-table td:not(:first-child) { text-align: right; font-family: var(--font-mono); }
.stock-ticker-cell { display: flex; flex-direction: column; gap: 2px; }
.stock-ticker { font-family: var(--font-mono); font-size: 13px; color: var(--accent); font-weight: 500; }
.stock-co-name { font-size: 11px; color: var(--text3); }
.sparkline { display: inline-block; vertical-align: middle; }

/* Weekly Watch */
.weekly-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.weekly-item:last-child { margin-bottom: 0; }
.weekly-item-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.weekly-item-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
.weekly-item-body { font-size: 12px; color: var(--text2); line-height: 1.6; }
.weekly-tag {
  font-family: var(--font-mono); font-size: 10px;
  padding: 2px 7px; border-radius: 4px; flex-shrink: 0; margin-left: 10px;
}
.tag-bull { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.tag-bear { background: var(--red-dim); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }
.tag-watch { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }

/* Loading state */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; gap: 16px;
}
.loading-bar {
  width: 180px; height: 2px; background: var(--bg3); border-radius: 1px; overflow: hidden;
}
.loading-bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 1px;
  animation: loadingBar 1.5s ease-in-out infinite;
}
@keyframes loadingBar { 0%{width:0;margin-left:0} 50%{width:100%;margin-left:0} 100%{width:0;margin-left:100%} }
.loading-text { font-family: var(--font-mono); font-size: 12px; color: var(--text3); }

/* Error state */
.error-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 20px; gap: 10px; text-align: center;
}
.error-icon { font-size: 32px; }
.error-title { font-size: 15px; color: var(--text); font-weight: 500; }
.error-desc { font-size: 13px; color: var(--text3); }
.retry-btn {
  margin-top: 8px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 6px; padding: 8px 18px;
  color: var(--text2); font-size: 13px; cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s;
}
.retry-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Colors */
.c-up { color: var(--green); }
.c-down { color: var(--red); }
.c-flat { color: var(--text3); }
.c-accent { color: var(--accent); }
.c-amber { color: var(--amber); }
.c-purple { color: var(--purple); }
.c-teal { color: var(--teal); }

/* Responsive */
@media (max-width: 900px) {
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .grid-wide { grid-template-columns: 1fr; }
  .index-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid-3 { grid-template-columns: 1fr; }
  .ticker-strip { gap: 16px; }
  .sector-hero-stats { flex-wrap: wrap; gap: 12px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">US</div>
      <div>
        <div class="logo-text">MARKET INTEL</div>
        <div class="logo-sub">미국 시장 인텔리전스</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><span class="live-dot"></span>AI 분석</div>
      <div class="header-time" id="clockDisplay"></div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAllData()">
        <span id="refreshIcon">↻</span> 데이터 갱신
      </button>
    </div>
  </div>
</header>

<div class="nav-wrap">
  <div class="nav-inner">
    <button class="nav-tab active" onclick="switchTab('overview')" id="tab-overview">
      <span class="nav-icon">◈</span> 전체 개요
    </button>
    <button class="nav-tab" onclick="switchTab('tech')" id="tab-tech">
      <span class="sector-dot" style="background:#4f9eff"></span> 기술
    </button>
    <button class="nav-tab" onclick="switchTab('energy')" id="tab-energy">
      <span class="sector-dot" style="background:#f59e0b"></span> 에너지
    </button>
    <button class="nav-tab" onclick="switchTab('finance')" id="tab-finance">
      <span class="sector-dot" style="background:#10b981"></span> 금융
    </button>
    <button class="nav-tab" onclick="switchTab('crypto')" id="tab-crypto">
      <span class="sector-dot" style="background:#8b5cf6"></span> 코인
    </button>
  </div>
</div>

<main>
  <div class="wrap">

    <!-- ══════════════════════════════════════════ OVERVIEW PAGE -->
    <div class="page active" id="page-overview">

      <!-- Ticker Strip (placeholder, filled by JS) -->
      <div class="ticker-strip" id="tickerStrip">
        <div class="loading-text">지수 데이터 로딩 중...</div>
      </div>

      <div class="grid-wide">
        <!-- Main News -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">📰 미국 경제시장 주요 뉴스</div>
            <div class="card-badge" id="newsBadgeTime">-</div>
          </div>
          <div class="card-body" id="mainNewsBody">
            <div class="loading-state">
              <div class="loading-bar"><div class="loading-bar-fill"></div></div>
              <div class="loading-text">AI 뉴스 분석 중...</div>
            </div>
          </div>
        </div>

        <!-- Sidebar: Buzz + Schedule -->
        <div style="display:flex;flex-direction:column;gap:16px;">
          <!-- VIX / Market Mood -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">🌡 시장 온도계</div>
            </div>
            <div class="card-body" id="moodBody">
              <div class="loading-state" style="padding:24px 0">
                <div class="loading-bar"><div class="loading-bar-fill"></div></div>
              </div>
            </div>
          </div>
          <!-- Buzz -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">🔥 전일 버즈량 TOP 종목</div>
            </div>
            <div class="card-body" id="buzzBody">
              <div class="loading-state" style="padding:24px 0">
                <div class="loading-bar"><div class="loading-bar-fill"></div></div>
              </div>
            </div>
          </div>
        </div>

/* ── CLAUDE API CALL ── */
async function callClaude(prompt, maxTokens = 2000) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: 'You are a financial data API. You MUST respond with ONLY a valid JSON object. No explanations, no markdown, no code blocks, no Korean text outside JSON values. Start your response with { and end with }. Never include ```json or ``` markers.',
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const errBody = await res.text();
    throw new Error(`API ${res.status}: ${errBody}`);
  }
  const data = await res.json();
  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  return extractJSON(text);
}

/* ── ROBUST JSON EXTRACTOR ── */
function extractJSON(text) {
  // 1) strip markdown fences
  let cleaned = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  // 2) try direct parse
  try { return JSON.parse(cleaned); } catch(_) {}
  // 3) find first { ... } block
  const start = cleaned.indexOf('{');
  const end   = cleaned.lastIndexOf('}');
  if (start !== -1 && end !== -1 && end > start) {
    try { return JSON.parse(cleaned.slice(start, end + 1)); } catch(_) {}
  }
  // 4) last resort: find longest valid JSON substring
  for (let i = start; i < cleaned.length; i++) {
    for (let j = cleaned.length; j > i; j--) {
      if (cleaned[i] === '{' && cleaned[j-1] === '}') {
        try { return JSON.parse(cleaned.slice(i, j)); } catch(_) {}
      }
    }
  }
  console.error('JSON 추출 실패. 원본 텍스트:', text.slice(0, 300));
  throw new Error('JSON 파싱 실패: AI 응답에서 유효한 JSON을 찾을 수 없습니다.');
}

      <div class="buzz-rank">${b.rank}</div>
      <div class="buzz-ticker">${b.ticker}</div>
      <div class="buzz-name">${b.name}<br><span style="font-size:10px;color:var(--text3);">${b.reason}</span></div>
      <div class="buzz-heat">
        ${[1,2,3,4,5].map(i=>`<div class="heat-bar ${i<=b.heat?'filled':''}"></div>`).join('')}
      </div>
      <div class="buzz-chg c-${b.direction}">${b.change}</div>
    </div>
  `).join('');

  // Schedule
  document.getElementById('scheduleBody').innerHTML = data.schedule.map(s => `
    <div class="sched-item">
      <div class="sched-time-col">
        <div class="sched-date">${s.date}</div>
        <div class="sched-time">${s.time_kst}</div>
      </div>
      <div class="sched-body">
        <div class="sched-title">
          <span class="imp imp-${s.importance}" style="margin-right:7px;">${s.importance==='high'?'높음':s.importance==='mid'?'보통':'낮음'}</span>
          ${s.title}
        </div>
        <div class="sched-desc">${s.desc}</div>
        <span class="sched-type sched-${s.type}">${s.type==='fed'?'연준':s.type==='econ'?'경제지표':'실적발표'}</span>
      </div>
    </div>
  `).join('');
}

function renderSector(sectorKey, data) {
  const cfg = SECTOR_CONFIG[sectorKey];
  const page = document.getElementById('page-' + sectorKey);

  const signalColor = s => s==='매수'?'var(--green)':s==='매도'?'var(--red)':'var(--text3)';
  const signalBg = s => s==='매수'?'var(--green-dim)':s==='매도'?'var(--red-dim)':'var(--bg4)';

  page.innerHTML = `
    <!-- Hero -->
    <div class="sector-hero" style="border-color:${cfg.color}22;">
      <div class="sector-hero-left">
        <div class="sector-hero-label">SECTOR ANALYSIS</div>
        <div class="sector-hero-name" style="color:${cfg.color};">${cfg.name}</div>
        <div class="sector-hero-desc">${cfg.desc}</div>
      </div>
      <div class="sector-hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-label">${cfg.etf} ETF</div>
          <div class="hero-stat-val" style="color:${cfg.color};">${data.sector_perf.etf_val}</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">섹터 등락</div>
          <div class="hero-stat-val c-${data.sector_perf.direction}">${data.sector_perf.pct}%</div>
        </div>
      </div>
    </div>

    <div class="grid-wide">
      <!-- News -->
      <div class="card">
        <div class="card-header">
          <div class="card-title" style="color:${cfg.color};">📰 주요 뉴스 TOP 5</div>
        </div>
        <div class="card-body">
          ${data.top_news.map(n => `
            <div class="news-item" onclick="this.classList.toggle('expanded')" style="cursor:pointer;">
              <div class="news-num">${n.rank}</div>
              <div class="news-body">
                <div class="news-title">${n.headline}</div>
                <div class="news-meta">
                  <span class="imp imp-${n.importance}">${n.importance==='high'?'높음':n.importance==='mid'?'보통':'낮음'}</span>
                  <span class="news-source">${n.source}</span>
                  <span class="news-time">${n.time}</span>
                  ${n.impact?`<span style="font-size:10px;color:var(--teal);font-family:var(--font-mono);">→ ${n.impact}</span>`:''}
                </div>
                <div class="news-summary">${n.summary}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Weekly Watch -->
      <div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header">
            <div class="card-title">👁 이번 주 참고 포인트</div>
          </div>
          <div class="card-body">
            ${data.weekly_watch.map(w => `
              <div class="weekly-item">
                <div class="weekly-item-header">
                  <div class="weekly-item-title">${w.title}</div>
                  <span class="weekly-tag tag-${w.tag}">${w.tag==='bull'?'강세':w.tag==='bear'?'약세':'주시'}</span>
                </div>
                <div class="weekly-item-body">${w.body}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- Stock Table -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">📈 주요 기업 주가 현황</div>
        <div class="card-badge">${cfg.etf} 구성종목</div>
      </div>
      <div class="card-body" style="overflow-x:auto;">
        <table class="stock-table">
          <thead>
            <tr>
              <th>종목</th>
              <th>현재가</th>
              <th>등락</th>
              <th>시가총액</th>
              <th>P/E</th>
              <th>시그널</th>
            </tr>
          </thead>
          <tbody>
            ${data.stocks.map(s => `
              <tr>
                <td>
                  <div class="stock-ticker-cell">
                    <span class="stock-ticker">${s.ticker}</span>
                    <span class="stock-co-name">${s.name}</span>
                  </div>
                </td>
                <td>$${s.price}</td>
                <td class="c-${s.direction}">${s.direction==='up'?'▲':'▼'} ${s.change}</td>
                <td style="color:var(--text2);">${s.mktcap}</td>
                <td style="color:var(--text2);">${s.pe}</td>
                <td>
                  <span style="font-family:var(--font-mono);font-size:11px;padding:2px 8px;border-radius:4px;background:${signalBg(s.signal)};color:${signalColor(s.signal)};">${s.signal}</span>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function showError(containerId, onRetry) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠</div>
      <div class="error-title">데이터 로드 실패</div>
      <div class="error-desc">API 연결 오류 또는 네트워크 문제입니다</div>
      <button class="retry-btn" onclick="${onRetry}">다시 시도</button>
    </div>`;
}

function showSectorError(sectorKey) {
  const page = document.getElementById('page-' + sectorKey);
  page.innerHTML = `
    <div class="card" style="margin-top:20px;">
      <div class="card-body">
        <div class="error-state">
          <div class="error-icon">⚠</div>
          <div class="error-title">섹터 데이터 로드 실패</div>
          <div class="error-desc">API 연결 오류입니다. 상단 "데이터 갱신" 버튼을 눌러주세요.</div>
          <button class="retry-btn" onclick="loadSectorData('${sectorKey}')">다시 시도</button>
        </div>
      </div>
    </div>`;
}

/* ── LOAD DATA ── */
async function loadOverviewData() {
  try {
    const data = await callClaude(buildOverviewPrompt(), 2500);
    dataCache.overview = data;
    renderOverview(data);
  } catch(e) {
    console.error(e);
    ['mainNewsBody','indexBody','sectorBody','buzzBody','scheduleBody','moodBody'].forEach(id => showError(id, 'loadOverviewData()'));
    document.getElementById('tickerStrip').innerHTML = `<div style="color:var(--red);font-size:12px;">⚠ 데이터 로드 실패 — 데이터 갱신 버튼을 눌러주세요</div>`;
  }
}

async function loadSectorData(sectorKey) {
  const page = document.getElementById('page-' + sectorKey);
  page.innerHTML = `
    <div class="loading-state" style="padding:80px 20px;">
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <div class="loading-text">${SECTOR_CONFIG[sectorKey].name} 데이터 분석 중...</div>
    </div>`;
  try {
    const data = await callClaude(buildSectorPrompt(sectorKey), 2000);
    dataCache[sectorKey] = data;
    renderSector(sectorKey, data);
  } catch(e) {
    console.error(e);
    showSectorError(sectorKey);
  }
}

async function loadAllData() {
  if (isLoading) return;
  isLoading = true;
  dataCache = {};
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.classList.add('loading');
  icon.classList.add('spin');
  icon.textContent = '↻';

  await loadOverviewData();
  if (currentTab !== 'overview') await loadSectorData(currentTab);

  isLoading = false;
  btn.classList.remove('loading');
  icon.classList.remove('spin');
}

/* ── INIT ── */
if (window.__PRELOADED_DATA__) {
  try {
    dataCache.overview = window.__PRELOADED_DATA__;
    renderOverview(window.__PRELOADED_DATA__);
    console.log('✅ 사전 로드 데이터 사용:', window.__PRELOADED_DATA__.date);
  } catch(e) {
    console.warn('사전 데이터 렌더링 실패, API 호출로 폴백:', e);
    loadAllData();
  }
} else {
  loadAllData();
}
</script>
