<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Market Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080a0f;
  --bg2:     #0d1017;
  --bg3:     #131820;
  --bg4:     #1a2130;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text:    #dde2ec;
  --text2:   #7a8499;
  --text3:   #3d4a60;
  --blue:    #3d8ef0;
  --blue2:   #1a5fc8;
  --green:   #00c896;
  --gd:      rgba(0,200,150,0.1);
  --red:     #ff4466;
  --rd:      rgba(255,68,102,0.1);
  --amber:   #f5a623;
  --ad:      rgba(245,166,35,0.1);
  --purple:  #9b6dff;
  --teal:    #00d4cc;
  --mono:    'IBM Plex Mono', monospace;
  --display: 'Bebas Neue', cursive;
  --body:    'Noto Sans KR', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden}

/* SCANLINE EFFECT */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

/* GRID BG */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(61,142,240,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(61,142,240,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 20px}

/* ── HEADER ── */
header{background:rgba(8,10,15,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;max-width:1440px;margin:0 auto;gap:16px}
.logo{display:flex;align-items:center;gap:12px}
.logo-box{width:36px;height:36px;background:var(--blue);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;letter-spacing:-0.5px}
.logo-name{font-family:var(--display);font-size:22px;letter-spacing:0.08em;color:var(--text)}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase}
.hdr-mid{display:flex;gap:24px;align-items:center}
.hdr-idx{display:flex;flex-direction:column;align-items:center;gap:1px}
.hdr-idx-name{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.06em}
.hdr-idx-val{font-family:var(--mono);font-size:13px;font-weight:500}
.hdr-right{display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.clock{font-family:var(--mono);font-size:10px;color:var(--text3)}
.load-btn{background:transparent;border:1px solid var(--border2);border-radius:4px;padding:6px 14px;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.load-btn:hover{border-color:var(--blue);color:var(--blue)}
.spin{display:inline-block;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── TABS ── */
.nav{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:61px;z-index:99}
.nav-in{max-width:1440px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none}
.nav-in::-webkit-scrollbar{display:none}
.tab{padding:13px 18px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;color:var(--text3);border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;white-space:nowrap;transition:all .2s;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-dot{width:6px;height:6px;border-radius:50%}

/* ── PAGES ── */
main{padding:24px 0 60px}
.page{display:none;animation:fadeUp .25s ease}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:7px}
.card-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text3)}
.card-body{padding:14px 16px}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.gw{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px}
.gw2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:1000px){.gw,.gw2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}}

/* ── IMPORTANCE ── */
.imp{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;flex-shrink:0;letter-spacing:0.04em;border:1px solid transparent}
.imp-high,.imp-critical{background:var(--rd);color:var(--red);border-color:rgba(255,68,102,0.2)}
.imp-mid,.imp-medium{background:var(--ad);color:var(--amber);border-color:rgba(245,166,35,0.2)}
.imp-low{background:var(--gd);color:var(--green);border-color:rgba(0,200,150,0.2)}

/* ── INDEX CARDS ── */
.idx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:800px){.idx-grid{grid-template-columns:repeat(2,1fr)}}
.idx-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 14px;transition:border-color .2s}
.idx-card:hover{border-color:var(--border2)}
.idx-sym{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;margin-bottom:5px}
.idx-val{font-family:var(--display);font-size:26px;letter-spacing:0.02em;color:var(--text);line-height:1;margin-bottom:4px}
.idx-chg{font-family:var(--mono);font-size:11px}
.idx-bar{height:2px;background:var(--bg4);border-radius:1px;margin-top:10px;overflow:hidden;position:relative}
.idx-fill{position:absolute;top:0;height:100%;border-radius:1px;transition:width 1.2s ease}

/* ── NEWS ── */
.news-item{padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.news-item:first-child{padding-top:0}
.news-item:last-child{border-bottom:none;padding-bottom:0}
.news-item:hover .news-hl{color:var(--blue)}
.news-top{display:flex;gap:10px;align-items:flex-start}
.news-num{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:14px;margin-top:2px}
.news-hl{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;flex:1;transition:color .2s}
.news-meta{display:flex;gap:7px;align-items:center;margin-top:5px;flex-wrap:wrap}
.news-src{font-family:var(--mono);font-size:9px;color:var(--text3)}
.news-time{font-family:var(--mono);font-size:9px;color:var(--text3)}
.news-impact{font-family:var(--mono);font-size:9px;color:var(--teal)}
.news-summary{font-size:12px;color:var(--text2);line-height:1.7;margin-top:7px;padding-left:24px;display:none}
.news-item.open .news-summary{display:block}
.news-arrow{font-size:11px;color:var(--text3);flex-shrink:0;margin-top:3px;transition:transform .2s}
.news-item.open .news-arrow{transform:rotate(90deg)}

/* ── SECTOR BARS ── */
.sec-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.sec-row:first-child{padding-top:0}
.sec-row:last-child{border-bottom:none;padding-bottom:0}
.sec-name{font-size:12px;color:var(--text2);min-width:72px}
.sec-bar-wrap{flex:1;height:4px;background:var(--bg4);border-radius:2px;position:relative}
.sec-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;transition:width .8s ease}
.sec-pct{font-family:var(--mono);font-size:11px;min-width:46px;text-align:right}

/* ── ECONOMIC INDICATORS ── */
.econ-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.econ-item:first-child{padding-top:0}
.econ-item:last-child{border-bottom:none;padding-bottom:0}
.econ-name{font-size:12px;color:var(--text2)}
.econ-right{display:flex;align-items:center;gap:10px}
.econ-val{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:500}
.econ-chg{font-family:var(--mono);font-size:11px}

/* ── BUZZ STOCKS ── */
.buzz-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.buzz-item:first-child{padding-top:0}
.buzz-item:last-child{border-bottom:none;padding-bottom:0}
.buzz-rank{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:14px;text-align:center}
.buzz-ticker{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue);min-width:48px}
.buzz-name{font-size:11px;color:var(--text2);flex:1;min-width:0}
.buzz-reason{font-size:10px;color:var(--text3);display:block;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.buzz-heat{display:flex;gap:2px}
.heat-b{width:3px;height:12px;border-radius:1.5px;background:var(--bg4)}
.heat-b.on{background:var(--blue)}
.buzz-chg{font-family:var(--mono);font-size:12px;min-width:52px;text-align:right}

/* ── SCHEDULE ── */
.sched-item{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.sched-item:first-child{padding-top:0}
.sched-item:last-child{border-bottom:none;padding-bottom:0}
.sched-time{min-width:60px}
.sched-date{font-family:var(--mono);font-size:9px;color:var(--text3)}
.sched-kst{font-family:var(--mono);font-size:11px;color:var(--text2);font-weight:500}
.sched-body{flex:1}
.sched-title{font-size:12px;color:var(--text);font-weight:500;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sched-desc{font-size:11px;color:var(--text3);line-height:1.5}
.sched-type{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;display:inline-block;margin-top:4px}
.t-econ{background:rgba(61,142,240,0.12);color:var(--blue)}
.t-fed{background:rgba(155,109,255,0.12);color:var(--purple)}
.t-earn,.t-earnings{background:rgba(0,212,204,0.12);color:var(--teal)}

/* ── MARKET MOOD ── */
.mood-wrap{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.mood-gauge{position:relative;width:64px;height:64px;flex-shrink:0}
.mood-gauge svg{transform:rotate(-90deg)}
.mood-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:15px;font-weight:600}
.mood-info{}
.mood-label{font-family:var(--display);font-size:22px;letter-spacing:0.05em}
.mood-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.mood-signal{font-size:12px;color:var(--text3);background:var(--bg4);border-radius:5px;padding:8px 10px;margin-bottom:8px}
.mood-summary{font-size:12px;color:var(--text2);line-height:1.7}

/* ── OUTLOOK ── */
.outlook-summary{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.outlook-section{margin-bottom:12px}
.outlook-section-title{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.outlook-item{display:flex;gap:8px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px;align-items:flex-start}
.outlook-item:last-child{margin-bottom:0}
.outlook-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:7px}
.sentiment-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:4px;margin-top:10px;font-weight:500}

/* ── SECTOR PAGE ── */
.sector-banner{border:1px solid var(--border);border-radius:8px;padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.sector-banner-left{}
.sector-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.sector-name{font-family:var(--display);font-size:36px;letter-spacing:0.06em}
.sector-desc{font-size:12px;color:var(--text2);margin-top:4px;max-width:480px;line-height:1.5}
.sector-stats{display:flex;gap:20px}
.s-stat{}
.s-stat-label{font-family:var(--mono);font-size:9px;color:var(--text3)}
.s-stat-val{font-family:var(--mono);font-size:18px;font-weight:500;margin-top:2px}

/* STOCK TABLE */
.stk-table{width:100%;border-collapse:collapse}
.stk-table th{font-family:var(--mono);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);text-align:left;padding:0 0 10px;border-bottom:1px solid var(--border)}
.stk-table th:not(:first-child){text-align:right}
.stk-table td{padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.stk-table tr:last-child td{border-bottom:none}
.stk-table td:not(:first-child){text-align:right;font-family:var(--mono)}
.stk-ticker{font-family:var(--mono);font-size:13px;color:var(--blue);font-weight:600}
.stk-co{font-size:10px;color:var(--text3);margin-top:1px}
.sig{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px}
.sig-buy{background:var(--gd);color:var(--green)}
.sig-hold{background:var(--bg4);color:var(--text3)}
.sig-sell{background:var(--rd);color:var(--red)}

/* WEEKLY WATCH */
.watch-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:8px}
.watch-item:last-child{margin-bottom:0}
.watch-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.watch-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.watch-body{font-size:12px;color:var(--text2);line-height:1.6}
.wtag{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;flex-shrink:0}
.wtag-bull{background:var(--gd);color:var(--green)}
.wtag-bear{background:var(--rd);color:var(--red)}
.wtag-watch{background:var(--ad);color:var(--amber)}

/* LOADING / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:12px}
.loading-bar{width:160px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.loading-fill{height:100%;background:var(--blue);animation:load 1.4s ease-in-out infinite;border-radius:1px}
@keyframes load{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.loading-txt{font-family:var(--mono);font-size:11px;color:var(--text3)}
.err{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:8px;text-align:center}
.err-ico{font-size:28px}
.err-title{font-size:14px;color:var(--text);font-weight:500}
.err-desc{font-size:12px;color:var(--text3)}

/* UTILS */
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--text3)}
.mb14{margin-bottom:14px}
</style>
</head>
<body>

<header>
<div class="hdr">
  <div class="logo">
    <div class="logo-box">US</div>
    <div>
      <div class="logo-name">MARKET INTEL</div>
      <div class="logo-sub">미국 시장 인텔리전스</div>
    </div>
  </div>
  <div class="hdr-mid" id="hdrIndices"></div>
  <div class="hdr-right">
    <div class="live"><span class="live-dot"></span>LIVE</div>
    <div class="clock" id="clock"></div>
    <button class="load-btn" id="loadBtn" onclick="loadData()"><span id="loadIco">↻</span> 데이터 갱신</button>
  </div>
</div>
</header>

<div class="nav">
<div class="nav-in">
  <button class="tab on" onclick="goTab('overview')" id="tab-overview">◈ 전체 개요</button>
  <button class="tab" onclick="goTab('tech')" id="tab-tech"><span class="tab-dot" style="background:#3d8ef0"></span>기술</button>
  <button class="tab" onclick="goTab('energy')" id="tab-energy"><span class="tab-dot" style="background:#f5a623"></span>에너지</button>
  <button class="tab" onclick="goTab('finance')" id="tab-finance"><span class="tab-dot" style="background:#00c896"></span>금융</button>
  <button class="tab" onclick="goTab('crypto')" id="tab-crypto"><span class="tab-dot" style="background:#9b6dff"></span>코인</button>
</div>
</div>

<main>
<div class="wrap">

<!-- ══ OVERVIEW ══ -->
<div class="page on" id="page-overview">

  <!-- Index Row -->
  <div class="idx-grid" id="idxGrid">
    <div class="loading" style="grid-column:1/-1;padding:24px"><div class="loading-bar"><div class="loading-fill"></div></div></div>
  </div>

  <div class="gw">
    <!-- News -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">📰 주요 뉴스</div>
        <div class="card-tag" id="newsTime">-</div>
      </div>
      <div class="card-body" id="newsBody"><div class="loading"><div class="loading-bar"><div class="loading-fill"></div></div><div class="loading-txt">뉴스 로딩 중...</div></div></div>
    </div>

    <!-- Right column -->
    <div style="display:flex;flex-direction:column;gap:14px">
      <!-- Mood -->
      <div class="card">
        <div class="card-hdr"><div class="card-title">🌡 시장 온도계</div></div>
        <div class="card-body" id="moodBody"><div class="loading" style="padding:20px"><div class="loading-bar"><div class="loading-fill"></div></div></div></div>
      </div>
      <!-- Buzz -->
      <div class="card">
        <div class="card-hdr"><div class="card-title">🔥 버즈량 TOP 종목</div></div>
        <div class="card-body" id="buzzBody"><div class="loading" style="padding:20px"><div class="loading-bar"><div class="loading-fill"></div></div></div></div>
      </div>
    </div>
  </div>

  <div class="g2">
    <!-- Sectors -->
    <div class="card">
      <div class="card-hdr"><div class="card-title">⬡ 섹터별 동향</div></div>
      <div class="card-body" id="sectorBody"><div class="loading" style="padding:20px"><div class="loading-bar"><div class="loading-fill"></div></div></div></div>
    </div>
    <!-- Economic Indicators -->
    <div class="card">
      <div class="card-hdr"><div class="card-title">📈 주요 경제지표</div></div>
      <div class="card-body" id="econBody"><div class="loading" style="padding:20px"><div class="loading-bar"><div class="loading-fill"></div></div></div></div>
    </div>
  </div>

  <div class="g2">
    <!-- Schedule -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">📅 주요 일정 (KST)</div>
        <div class="card-tag">향후 5거래일</div>
      </div>
      <div class="card-body" id="schedBody"><div class="loading" style="padding:20px"><div class="loading-bar"><div class="loading-fill"></div></div></div></div>
    </div>
    <!-- Outlook -->
    <div class="card">
      <div class="card-hdr"><div class="card-title">🔭 시장 전망 · 전략</div></div>
      <div class="card-body" id="outlookBody"><div class="loading" style="padding:20px"><div class="loading-bar"><div class="loading-fill"></div></div></div></div>
    </div>

<script>
/* ── SECTOR CONFIG ── */
const SECTORS = {
  tech:    { name:'기술', color:'#3d8ef0', desc:'반도체·AI·소프트웨어·클라우드', tickers:['NVDA','AAPL','MSFT','META','GOOGL','AMZN','AMD','TSLA','ORCL','ADBE'], etf:'QQQ' },
  energy:  { name:'에너지', color:'#f5a623', desc:'원유·천연가스·재생에너지·정유', tickers:['XOM','CVX','COP','SLB','MPC','PSX','VLO','OXY','HAL','DVN'], etf:'XLE' },
  finance: { name:'금융', color:'#00c896', desc:'은행·보험·핀테크·자산운용', tickers:['JPM','BAC','GS','MS','WFC','BLK','C','AXP','V','MA'], etf:'XLF' },
  crypto:  { name:'코인', color:'#9b6dff', desc:'비트코인·이더리움·블록체인 기업', tickers:['COIN','MSTR','MARA','RIOT','CLSK','HUT','IBIT','BITB','FBTC','GBTC'], etf:'BITO' },
};

let DATA = null;
let SECTOR_DATA = {};
let currentTab = 'overview';

/* ── CLOCK ── */
function tick() {
  const kst = new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const et  = new Date().toLocaleString('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock').textContent = `KST ${kst}  ·  ET ${et}`;
}
setInterval(tick,1000); tick();

/* ── TAB ── */
function goTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+t).classList.add('on');
  if (t !== 'overview' && !SECTOR_DATA[t]) loadSector(t);
}

/* ── HELPERS ── */
const fmt = n => n?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) ?? '-';
const pct = n => (n >= 0 ? '+' : '') + n?.toFixed(2) + '%';
const cls = n => n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
const arr = n => n > 0 ? '▲' : n < 0 ? '▼' : '–';
const impCls = s => {
  if(!s) return 'imp-low';
  const l = s.toLowerCase();
  if(l==='critical'||l==='high'||l==='높음') return 'imp-high';
  if(l==='medium'||l==='mid'||l==='보통') return 'imp-mid';
  return 'imp-low';
};
const impLabel = s => {
  if(!s) return '낮음';
  const l = s.toLowerCase();
  if(l==='critical') return '긴급';
  if(l==='high'||l==='높음') return '높음';
  if(l==='medium'||l==='mid'||l==='보통') return '보통';
  return '낮음';
};

/* ── RENDER OVERVIEW ── */
function renderOverview(d) {
  /* Header indices */
  const hi = d.indices;
  const hItems = [
    {sym:'S&P 500', v:hi.sp500?.value, c:hi.sp500?.change_pct},
    {sym:'NASDAQ',  v:hi.nasdaq?.value, c:hi.nasdaq?.change_pct},
    {sym:'DOW',     v:hi.dow?.value,   c:hi.dow?.change_pct},
    {sym:'VIX',     v:hi.vix?.value,   c:hi.vix?.change},
  ];
  document.getElementById('hdrIndices').innerHTML = hItems.map(x=>`
    <div class="hdr-idx">
      <div class="hdr-idx-name">${x.sym}</div>
      <div class="hdr-idx-val ${cls(x.c)}">${fmt(x.v)}</div>
    </div>`).join('');

  /* Index cards */
  const idxDefs = [
    {sym:'S&P 500', key:'sp500'},{sym:'NASDAQ', key:'nasdaq'},
    {sym:'DOW',     key:'dow'},  {sym:'VIX',    key:'vix'}
  ];
  document.getElementById('idxGrid').innerHTML = idxDefs.map(def=>{
    const idx = d.indices[def.key];
    if(!idx) return '';
    const chgPct = idx.change_pct ?? idx.change ?? 0;
    const barW = Math.min(Math.abs(chgPct)*15, 100);
    const fillColor = chgPct>=0?'var(--green)':'var(--red)';
    return `
    <div class="idx-card">
      <div class="idx-sym">${def.sym}</div>
      <div class="idx-val">${idx.value?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})??'-'}</div>
      <div class="idx-chg ${cls(chgPct)}">${arr(chgPct)} ${chgPct>=0?'+':''}${chgPct?.toFixed(2)}${def.key==='vix'?'':' %'}</div>
      <div class="idx-bar"><div class="idx-fill" style="width:${barW}%;background:${fillColor}"></div></div>
    </div>`;
  }).join('');

  /* News */
  const kstDate = new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('newsTime').textContent = kstDate;
  document.getElementById('newsBody').innerHTML = (d.top_news||[]).map((n,i)=>`
    <div class="news-item" onclick="this.classList.toggle('open')">
      <div class="news-top">
        <span class="news-num">${i+1}</span>

  /* Market mood */
  const mood = d.market_mood;
  if(mood) {

        <div class="mood-gauge">

            <circle cx="32" cy="32" r="${r}" fill="none" stroke="var(--bg4)" stroke-width="6"/>
            <circle cx="32" cy="32" r="${r}" fill="none" stroke="${mc}" stroke-width="6"
              stroke-dasharray="${circ*score/100} ${circ}" stroke-linecap="round"/>
          </svg>
          <div class="mood-center" style="color:${mc}">${score}</div>
        </div>
        <div class="mood-info">
          <div class="mood-label" style="color:${mc}">${mood.label??''}</div>
          <div class="mood-sub">공포·탐욕 지수</div>

  /* Buzz stocks */
  document.getElementById('buzzBody').innerHTML = (d.buzz_stocks||[]).map(b=>{
    const chgCls = cls(b.change_pct);
    return `
    <div class="buzz-item">
      <div class="buzz-rank">${b.rank??''}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="buzz-ticker">${b.ticker??''}</span>
          <span class="buzz-name">${b.name??''}</span>
        </div>
        <span class="buzz-reason">${b.reason??''}</span>
      </div>
      <div class="buzz-heat">${[1,2,3,4,5].map(i=>`<div class="heat-b ${i<=(b.heat??0)?'on':''}"></div>`).join('')}</div>
      <div class="buzz-chg ${chgCls}">${arr(b.change_pct)} ${b.change_pct>=0?'+':''}${b.change_pct?.toFixed(1)}%</div>
    </div>`;
  }).join('');

  /* Sectors */
  document.getElementById('sectorBody').innerHTML = (d.sectors||[]).map(s=>{
    const p = s.change_pct??0;
    const barW = Math.min(Math.abs(p)*18,50);
    const barLeft = p>=0 ? '50%' : `calc(50% - ${barW}%)`;
    return `
    <div class="sec-row">
      <div class="sec-name">${s.name}</div>
      <div class="sec-bar-wrap">
        <div class="sec-bar-fill" style="width:${barW}%;left:${barLeft};background:${p>=0?'var(--green)':'var(--red)'}"></div>

      <div class="sec-pct ${cls(p)}">${p>=0?'+':''}${p.toFixed(2)}%</div>
    </div>`;
  }).join('');

  /* Economic indicators */
  document.getElementById('econBody').innerHTML = (d.economic_indicators||[]).map(e=>{
    const chg = e.change??0;
    return `
    <div class="econ-item">
      <div class="econ-name">${e.name}</div>
      <div class="econ-right">
        <div class="econ-val">${e.value}${e.unit?' '+e.unit:''}</div>
        <div class="econ-chg ${cls(chg)}">${arr(chg)} ${Math.abs(chg).toFixed(2)}</div>
      </div>
    </div>`;
  }).join('');

  /* Schedule */
  document.getElementById('schedBody').innerHTML = (d.schedule||[]).map(s=>`
    <div class="sched-item">
      <div class="sched-time">
        <div class="sched-date">${s.date_kst??s.date??''}</div>
        <div class="sched-kst">${s.time_kst??s.time??''}</div>
      </div>
      <div class="sched-body">
        <div class="sched-title">
          <span class="imp ${impCls(s.importance)}">${impLabel(s.importance)}</span>
          ${s.title??''}
        </div>
        <div class="sched-desc">${s.description??s.desc??''}</div>
        <span class="sched-type t-${(s.type??'econ').toLowerCase()}">${
          {econ:'경제지표',fed:'연준',earn:'실적발표',earnings:'실적발표'}[s.type?.toLowerCase()]??s.type??''
        }</span>
      </div>
    </div>`).join('');

  /* Market outlook */
  const out = d.market_outlook;
  if(out) {
    const sentColor = out.overall_sentiment==='bullish'?'var(--green)':out.overall_sentiment==='bearish'?'var(--red)':'var(--amber)';
    const sentLabel = {bullish:'강세 (Bullish)',neutral:'중립 (Neutral)',bearish:'약세 (Bearish)'}[out.overall_sentiment]??out.overall_sentiment??'';
    document.getElementById('outlookBody').innerHTML = `
      <div class="outlook-summary">${out.summary??''}</div>
      ${out.key_risks?.length?`
      <div class="outlook-section">
        <div class="outlook-section-title">⚠ 핵심 리스크</div>
        ${out.key_risks.map(r=>`<div class="outlook-item"><div class="outlook-dot" style="background:var(--red)"></div><span>${r}</span></div>`).join('')}
      </div>`:''}
      ${out.strategy?.length?`
      <div class="outlook-section">
        <div class="outlook-section-title">🎯 트레이딩 전략</div>
        ${out.strategy.map(r=>`<div class="outlook-item"><div class="outlook-dot" style="background:var(--blue)"></div><span>${r}</span></div>`).join('')}
      </div>`:''}
      <div class="sentiment-badge" style="background:${sentColor}22;color:${sentColor};border:1px solid ${sentColor}44">
        ${out.overall_sentiment==='bullish'?'↑':out.overall_sentiment==='bearish'?'↓':'→'} ${sentLabel}
      </div>`;
  }
}

/* ── LOAD JSON FROM FILE ── */
async function loadData() {
  const btn = document.getElementById('loadBtn');
  const ico = document.getElementById('loadIco');
  btn.disabled = true;
  ico.className = 'spin';

  /* Try preloaded data first */
  if (window.MARKET_DATA || window.__PRELOADED_DATA__) {
    const d = window.MARKET_DATA || window.__PRELOADED_DATA__;
    DATA = d;
    renderOverview(d);
    if(currentTab !== 'overview') loadSector(currentTab);
    btn.disabled = false; ico.className = '';
    return;
  }

  /* Try loading from reports folder (same directory) */
  const today = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
  const paths = [
    `reports/market_data_${today}.json`,
    `market_data_${today}.json`,
    `reports/market_data.json`,
    `market_data.json`,
  ];

  let loaded = false;
  for (const path of paths) {
    try {
      const res = await fetch(path);
      if (res.ok) {
        DATA = await res.json();
        renderOverview(DATA);
        loaded = true;
        break;
      }
    } catch(_) {}
  }

  if (!loaded) {
    /* Show helpful message */
    const errHtml = `
      <div class="err">
        <div class="err-ico">📂</div>
        <div class="err-title">JSON 데이터 파일이 없습니다</div>
        <div class="err-desc" style="max-width:320px;line-height:1.7">
          <strong>market_report_auto.bat</strong> 을 먼저 실행하면<br>
          <code style="font-size:10px;color:var(--blue)">reports/market_data_${today}.json</code><br>
          파일이 생성되고 대시보드가 자동으로 채워집니다.
        </div>
      </div>`;
    ['newsBody','idxGrid','moodBody','buzzBody','sectorBody','econBody','schedBody','outlookBody'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.innerHTML = errHtml;
    });
  }

  btn.disabled = false; ico.className = '';
}

async function loadSector(key) {
  const page = document.getElementById('page-'+key);
  page.innerHTML = `<div class="loading" style="padding:80px"><div class="loading-bar"><div class="loading-fill"></div></div><div class="loading-txt">${SECTORS[key].name} 섹터 데이터 로딩 중...</div></div>`;

  /* 1. 이미 캐시된 데이터 */
  if (SECTOR_DATA[key]) { renderSector(key, SECTOR_DATA[key]); return; }

  /* 2. HTML에 내장된 프리로드 데이터 */
  if (window.SECTOR_PRELOAD && window.SECTOR_PRELOAD[key]) {
    SECTOR_DATA[key] = window.SECTOR_PRELOAD[key];
    renderSector(key, SECTOR_DATA[key]);
    return;
  }

  const today = new Date().toLocaleDateString('sv-SE');
  const paths = [
    `reports/sector_${key}_${today}.json`,
    `reports/sector_${key}.json`,
    `sector_${key}_${today}.json`,
  ];
  for (const path of paths) {
    try {
      const res = await fetch(path);
      if(res.ok) { SECTOR_DATA[key] = await res.json(); renderSector(key, SECTOR_DATA[key]); return; }
    } catch(_) {}
  }

  /* Fallback: use preloaded sector data or overview */
  if (window.SECTOR_PRELOAD && window.SECTOR_PRELOAD[key]) {
    SECTOR_DATA[key] = window.SECTOR_PRELOAD[key];
    renderSector(key, SECTOR_DATA[key]);
  } else if (DATA) {
    const sec = DATA.sectors?.find(s=>s.en?.toLowerCase().includes(key));
    const pctVal = sec ? (sec.change_pct>=0?'+':'')+sec.change_pct.toFixed(2) : '0.00';
    renderSector(key, {
      sector_perf: { pct: pctVal, etf_val:'-' },
      top_news: DATA.top_news?.slice(0,3)??[],
      stocks: [], weekly_watch: []
    });
  } else {
    page.innerHTML = `<div class="err" style="margin-top:40px"><div class="err-ico">📂</div><div class="err-title">섹터 데이터 없음</div><div class="err-desc">market_report_auto.bat 실행 후 새로고침하세요</div></div>`;
  }
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', loadData);
</script>

<script>
