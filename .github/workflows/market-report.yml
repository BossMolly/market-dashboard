name: 미국 시장 일일 리포트 자동 생성

on:
  schedule:
    # 평일 매일 오전 7시 KST = UTC 전날 22:00
    - cron: '0 22 * * 0-4'
  workflow_dispatch:   # 수동 실행 버튼 (언제든 즉시 실행)

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 저장소 체크아웃 ──────────────────────────────
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # ── 2. Node.js 설치 ─────────────────────────────────
      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Python 설치 ──────────────────────────────────
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Claude Code 설치 ─────────────────────────────
      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      # ── 5. 전체 개요 데이터 수집 ────────────────────────
      - name: 전체 개요 데이터 수집
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CAPI }}
        run: |
          TODAY=$(TZ='Asia/Seoul' date +"%Y-%m-%d")
          NOW=$(TZ='Asia/Seoul' date +"%H:%M KST")
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          echo "NOW=$NOW" >> $GITHUB_ENV
          echo "📅 수집 날짜: $TODAY $NOW"

          claude --print -p "
          오늘($TODAY $NOW) 미국 주식 시장 최신 데이터를 웹에서 검색하여
          아래 JSON 형식으로만 응답하세요.
          반드시 { 로 시작하고 } 로 끝내세요.
          Markdown, 코드블록, 설명 없이 순수 JSON만 출력하세요.

          {
            \"date\": \"$TODAY\",
            \"updated_at\": \"$NOW\",
            \"indices\": {
              \"sp500\":  {\"value\": 0, \"change\": 0, \"change_pct\": 0},
              \"nasdaq\": {\"value\": 0, \"change\": 0, \"change_pct\": 0},
              \"dow\":    {\"value\": 0, \"change\": 0, \"change_pct\": 0},
              \"vix\":    {\"value\": 0, \"change\": 0}
            },
            \"aiInsight\": {
              \"marketStory\": \"오늘 시장을 한 문장으로 — 수치보다 왜 움직였는지 중심으로\",
              \"marketBias\": \"risk-off 또는 risk-on 또는 neutral\",
              \"confidenceScore\": 75,
              \"drivers\": [
                {\"label\": \"핵심 드라이버 설명\", \"direction\": \"neg 또는 pos 또는 warn\", \"icon\": \"이모지\"},
                {\"label\": \"\", \"direction\": \"neg\", \"icon\": \"\"},
                {\"label\": \"\", \"direction\": \"pos\", \"icon\": \"\"},
                {\"label\": \"\", \"direction\": \"warn\", \"icon\": \"\"},
                {\"label\": \"\", \"direction\": \"neg\", \"icon\": \"\"}
              ],
              \"actionableInsights\": {
                \"equityBias\": \"bullish 또는 bearish 또는 neutral\",
                \"sectorRotation\": \"섹터 로테이션 방향 설명\",
                \"riskLevel\": \"high 또는 medium 또는 low\",
                \"watchList\": [\"NVDA\", \"티커 또는 이벤트\"],
                \"strategy\": [
                  \"구체적 액션 아이템 1\",
                  \"구체적 액션 아이템 2\",
                  \"구체적 액션 아이템 3\"
                ]
              },
              \"scenarios\": {
                \"bullish\": {
                  \"desc\": \"강세 시나리오 — 2~3문장\",
                  \"condition\": \"조건: 구체적 수치나 이벤트\"
