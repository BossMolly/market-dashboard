              {\"ticker\":\"FBTC\",\"name\":\"Fidelity BTC\",\"price\":\"\",\"change\":\"\",\"mktcap\":\"ETF\",\"pe\":\"N/A\",\"signal\":\"매수\"},
              {\"ticker\":\"GBTC\",\"name\":\"Grayscale BTC\",\"price\":\"\",\"change\":\"\",\"mktcap\":\"ETF\",\"pe\":\"N/A\",\"signal\":\"중립\"}
            ],
            \"weekly_watch\": [
              {\"title\":\"\",\"body\":\"\",\"tag\":\"bull\"},
              {\"title\":\"\",\"body\":\"\",\"tag\":\"bear\"},
              {\"title\":\"\",\"body\":\"\",\"tag\":\"watch\"}
            ]
          }

          signal은 매수/중립/매도 중 하나. 빈 값을 실제 데이터로 채워주세요.
          " --output-format text > sector_crypto_raw.txt
          echo "✅ 코인 섹터 수집 완료"

      # ── 7. JSON 추출 및 HTML 주입 ────────────────────────
      - name: JSON 추출 및 HTML 주입
        run: |
          python3 << 'PYEOF'
          import json, re, sys
          from pathlib import Path

          def extract_json(text):
              text = re.sub(r'```json\s*', '', text).replace('```', '').strip()
              s, e = text.find('{'), text.rfind('}')
              if s == -1 or e == -1:
                  return None
              try:
                  return json.loads(text[s:e+1])
              except:
                  return None

          # 전체 개요
          overview = extract_json(Path('market_data_raw.txt').read_text(encoding='utf-8'))
          if not overview:
              print('❌ 전체 개요 JSON 파싱 실패')
              sys.exit(1)
          print(f"✅ 전체 개요 파싱 완료: {overview.get('date','')}")

          # 섹터별
          sectors = {}
          for key, fname in [('tech','sector_tech_raw.txt'),('energy','sector_energy_raw.txt'),('finance','sector_finance_raw.txt'),('crypto','sector_crypto_raw.txt')]:
              data = extract_json(Path(fname).read_text(encoding='utf-8'))
              if data:
                  sectors[key] = data
                  print(f"✅ {key} 섹터 파싱 완료")
              else:
                  print(f"⚠️  {key} 섹터 파싱 실패 — 스킵")

          # HTML 읽기
          html = Path('us_market_dashboard.html').read_text(encoding='utf-8')

          # SECTOR_PRELOAD 교체
          sector_json = json.dumps(sectors, ensure_ascii=False, separators=(',', ':'))
          sector_block = f"/* ── SECTOR PRELOADED DATA ({overview.get('date','')}) ── */\nwindow.SECTOR_PRELOAD = {sector_json};"
          html = re.sub(
              r'/\* ── SECTOR PRELOADED DATA \([^)]+\) ── \*/\nwindow\.SECTOR_PRELOAD = \{.*?\};',
              sector_block, html, flags=re.DOTALL
          )

          # MARKET_DATA 교체
          overview_json = json.dumps(overview, ensure_ascii=False, indent=2)
          market_block = f"/* ── PRELOADED DATA ({overview.get('date','')}) ── */\nwindow.MARKET_DATA = {overview_json};"
          html = re.sub(
              r'/\* ── PRELOADED DATA \([^)]+\) ── \*/\nwindow\.MARKET_DATA = \{.*?\};',
              market_block, html, flags=re.DOTALL
          )

          # 저장
          Path('us_market_dashboard.html').write_text(html, encoding='utf-8')
          Path('index.html').write_text(html, encoding='utf-8')
          print('✅ HTML 주입 완료 → index.html 생성')
          PYEOF

      # ── 8. 임시 파일 정리 ───────────────────────────────
      - name: 임시 파일 정리
        run: rm -f market_data_raw.txt sector_*_raw.txt

      # ── 9. GitHub Pages 배포 ────────────────────────────
      - name: GitHub Pages 배포
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html us_market_dashboard.html
          git diff --cached --quiet || (
            git commit -m "📊 $(TZ='Asia/Seoul' date +'%Y-%m-%d') 시장 리포트 자동 업데이트"
            git push
            echo "✅ GitHub Pages 배포 완료!"
          )
